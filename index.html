<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#082f2f">
  <meta name="description" content="Dlužníček – jednoduchá stylová evidence půjček, splátek a dluhů.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dlužníček">
  <title>Dlužníček</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero-card" aria-label="Souhrn aplikace Dlužníček">
      <div class="topbar">
        <div class="brand">
          <img src="assets/icons/icon-192.png" alt="Ikona aplikace Dlužníček" class="brand-icon">
          <div>
            <p class="eyebrow">peníze pod dohledem</p>
            <h1>Dlužníček</h1>
          </div>
        </div>
        <button class="ghost-button small" id="installButton" type="button" hidden>Instalovat</button>
      </div>

      <section class="balance-panel">
        <div>
          <p class="label">Celkový zůstatek</p>
          <output id="totalBalance" class="balance">0 Kč</output>
          <p id="balanceHint" class="hint">Účetní skřítek zatím spí.</p>
        </div>
        <div class="wallet-badge" aria-hidden="true">Kč</div>
      </section>

      <div class="stat-grid" aria-label="Rychlé statistiky">
        <article class="stat-card">
          <span class="stat-label">Půjčeno</span>
          <strong id="totalLent">0 Kč</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Splaceno</span>
          <strong id="totalPaid">0 Kč</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Aktivní dlužníci</span>
          <strong id="activeDebtors">0</strong>
        </article>
      </div>
    </header>

    <main>
      <section class="card form-card" aria-labelledby="formTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">rychlý zápis</p>
            <h2 id="formTitle">Nový záznam</h2>
          </div>
          <button class="ghost-button small" id="resetFormButton" type="button">Vyčistit</button>
        </div>

        <form id="recordForm" autocomplete="off">
          <input type="hidden" id="editId" value="">

          <div class="segmented" role="radiogroup" aria-label="Typ záznamu">
            <button class="segment active" type="button" data-type="loan" role="radio" aria-checked="true">Půjčil jsem</button>
            <button class="segment" type="button" data-type="payment" role="radio" aria-checked="false">Splátka</button>
          </div>
          <input type="hidden" id="recordType" value="loan">

          <div class="field-grid">
            <label>
              <span>Jméno dlužníka</span>
              <input id="personInput" name="person" type="text" placeholder="třeba Pavel, Honza, kámo z busu" required maxlength="60">
            </label>
            <label>
              <span>Částka</span>
              <input id="amountInput" name="amount" inputmode="decimal" type="text" placeholder="např. 500 nebo 1 250,50" required>
            </label>
            <label>
              <span>Datum</span>
              <input id="dateInput" name="date" type="date" required>
            </label>
            <label>
              <span>Poznámka</span>
              <input id="noteInput" name="note" type="text" placeholder="pizza, benzín, životní chyba…" maxlength="120">
            </label>
          </div>

          <button class="primary-button" type="submit" id="submitButton">Uložit záznam</button>
        </form>
      </section>

      <section class="card" aria-labelledby="debtorsTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">kdo má máslo na hlavě</p>
            <h2 id="debtorsTitle">Dlužníci</h2>
          </div>
          <span class="pill" id="debtorsPill">0 lidí</span>
        </div>
        <div id="debtorsList" class="debtors-list"></div>
      </section>

      <section class="card" aria-labelledby="historyTitle">
        <div class="section-heading history-heading">
          <div>
            <p class="eyebrow">papírová stopa bez papíru</p>
            <h2 id="historyTitle">Historie</h2>
          </div>
          <div class="toolbar">
            <button class="ghost-button small" id="exportCsvButton" type="button">CSV</button>
            <button class="ghost-button small" id="exportJsonButton" type="button">Záloha</button>
            <label class="ghost-button small file-label" for="importJsonInput">Import</label>
            <input id="importJsonInput" type="file" accept="application/json,.json" hidden>
          </div>
        </div>

        <div class="filters">
          <label>
            <span>Hledat</span>
            <input id="searchInput" type="search" placeholder="jméno, poznámka, částka">
          </label>
          <label>
            <span>Filtr</span>
            <select id="typeFilter">
              <option value="all">Vše</option>
              <option value="loan">Půjčky</option>
              <option value="payment">Splátky</option>
            </select>
          </label>
          <label>
            <span>Řazení</span>
            <select id="sortSelect">
              <option value="newest">Nejnovější</option>
              <option value="oldest">Nejstarší</option>
              <option value="amountDesc">Nejvyšší částka</option>
              <option value="amountAsc">Nejnižší částka</option>
            </select>
          </label>
        </div>

        <div id="recordsList" class="records-list"></div>
        <button class="danger-button" id="clearAllButton" type="button">Smazat všechno</button>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js" defer></script>
</body>
</html>
